# Single source of ALL numeric parameters. Nothing numeric lives in src/.
# Credentials never appear here — env vars only (see .env.example).

execution:
  live_mode: false        # the ONLY switch for paper=False in the entire codebase
  broker: alpaca

data:
  data_source: polygon    # never yfinance for backtests (survivorship bias)
  db_path: data/trading.duckdb
  timeframe: "1Day"
  sync_pause_s: 13        # free Polygon tier: 5 requests/minute

risk:
  kelly_fraction: 0.25            # quarter-Kelly default; hard cap 0.50 enforced in code
  max_risk_per_trade_pct: 0.02    # step 3 — reduce, don't reject
  max_position_pct: 0.10          # step 4 — reduce, don't reject
  max_total_exposure_pct: 0.80    # step 5 — reject on breach
  max_sector_exposure_pct: 0.25   # step 6 — reject on breach
  max_correlation: 0.80           # step 7 — reject on breach
  circuit_breakers:
    daily_loss_pct: 0.03
    max_drawdown_pct: 0.15
    consecutive_losses: 5

wfo:                              # go/no-go gates before any paper trading
  min_windows: 5
  is_oos_ratio: 3                 # in-sample span = 3x the out-of-sample span
  min_wfe: 0.50
  min_oos_trades: 200
  min_oos_sharpe: 1.5
  max_oos_drawdown_pct: 0.20

backtest:
  initial_capital: 100000
  slippage_bps: 5
  commission_per_share: 0.005
  periods_per_year: 252

strategy:
  # liquid mega-caps/ETFs — hand-picked until the screener runs on paid data
  universe: [SPY, QQQ, AAPL, MSFT, NVDA, AMZN, GOOGL, META, TSLA, JPM,
             V, UNH, XOM, HD, PG, AVGO, LLY, COST, MRK, DIS]
  signal_threshold: 0.2
  warmup_bars: 80                 # must exceed the longest feature window + shift
  hostile_regimes: []             # HMM states in which NEW entries are blocked
  stats:                          # Kelly inputs — update from the latest WFO OOS results
    win_rate: 0.55
    avg_win: 1.5
    avg_loss: 1.0
  mean_reversion:                 # rule-based family (src/strategies/mean_reversion.py)
    entry_signal: 0.5             # signal = -zscore/zscore_clip -> 0.5 means z <= -1.5
    exit_signal: 0.0              # exit when price is back at/above its rolling mean
    max_hold_bars: 10             # time stop: unpaid reversion thesis is wrong
    zscore_clip: 3.0              # z-score normalization bound for the signal

signals:
  features:            # every window/threshold used by src/signals/features.py
    ret_windows: [1, 5, 20]
    vol_short_window: 20
    vol_long_window: 60
    parkinson_window: 20
    gk_window: 20
    sma_window: 20
    ema_window: 20
    ma_fast_window: 10
    ma_slow_window: 50
    macd_fast: 12
    macd_slow: 26
    macd_signal: 9
    zscore_window: 20
    bb_window: 20
    bb_std: 2.0
    cci_window: 20
    rsi_window: 14
    stoch_window: 14
    stoch_smooth: 3
    roc_window: 10
    mfi_window: 14
    volume_window: 20
  training:            # offline training scripts (scripts/train_*.py)
    label_horizon_bars: 10   # triple-barrier vertical barrier (expiry)
    label_pt_mult: 1.5       # take-profit width in EWMA-sigma units
    label_sl_mult: 1.0       # stop width — 1.5:1.0 mirrors strategy.stats payoff
    label_vol_span: 20       # EWMA span of the sigma estimate
    train_frac: 0.70
    valid_frac: 0.15
    n_estimators: 300
    learning_rate: 0.05
    num_leaves: 31
    hmm_states: 3

stream:
  reconnect_backoff_initial_s: 1.0
  reconnect_backoff_cap_s: 60.0

llm:
  provider: finbert            # finbert (local, free) | anthropic (API) | none
  finbert_model: ProsusAI/finbert
  model: claude-sonnet-4-6     # used only when provider: anthropic
  max_tokens: 200
  cache_ttl_s: 86400

screener:                         # 12k Alpaca assets -> point-in-time universe
  exchanges: [NYSE, NASDAQ, ARCA]
  min_price: 5.0
  min_median_dollar_volume: 5000000
  dollar_volume_window: 60
  min_history_days: 252
  max_atr_pct: 0.10
  rank_momentum_window: 63
  universe_size: 30
  max_per_sector: 8
  rebalance: weekly

universe_builder:                 # scripts/build_universe.py (mechanical universe)
  top_n: 100                      # universe size, ranked by median dollar volume
  min_days: 55                    # bars required inside the ranking window
  batch_size: 150                 # symbols per multi-bars request (10k rows/page)

monitoring:
  log_level: INFO
  daily_report_time_et: "16:05"
  alert_timeout_s: 5.0
