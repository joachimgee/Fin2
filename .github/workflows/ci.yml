name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check src tests
          ruff format --check src tests
      - name: Type check
        run: mypy
      - name: Unit tests (architecture gate included)
        run: pytest -m "not integration" --cov=src --cov-report=term
